<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindly</title>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container{
      text-align: center;
    }

    .logo{
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #8fd3ff, #5ba9d9);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 40px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    h1{
      color: #1f5f99;
      margin-bottom: 8px;
    }

    .subtitle{
      color: #7aa8c9;
      margin-bottom: 40px;
    }

    .cards{
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .card{
      width: 210px;
      height: 125px;
      background-color: #eef4f8;
      border: 1px solid #c6dff1;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover{
      transform: scale(1.03);
      background-color: #e7f2fa;
    }

    .card i{
      font-size: 35px;
      color: #5ba9d9;
      margin-bottom: 15px;
    }

    .card p{
      font-size: 28px;
      color: #114b84;
      font-weight: bold;
    }

    .crisis-btn{
      width: 440px;
      height: 70px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(90deg, #e74c4c, #cf3c2f);
      color: white;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(231, 76, 60, 0.3);
      transition: 0.3s;
    }

    .crisis-btn:hover{
      transform: scale(1.02);
    }

    @media(max-width: 600px){

      .cards{
        grid-template-columns: 1fr;
      }

      .card{
        width: 260px;
      }

      .crisis-btn{
        width: 260px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <i class="fa-solid fa-brain"></i>
    </div>

    <h1>Mindly</h1>
    <p class="subtitle">Cuide da sua saúde mental</p>

    <div class="cards">

      <div class="card">
        <i class="fa-solid fa-book-open"></i>
        <p>Diário</p>
      </div>

      <div class="card">
        <i class="fa-regular fa-lightbulb"></i>
        <p>Dicas</p>
      </div>

      <div class="card">
        <i class="fa-solid fa-dumbbell"></i>
        <p>Exercícios</p>
      </div>

      <div class="card">
        <i class="fa-regular fa-newspaper"></i>
        <p>Notícias</p>
      </div>

    </div>

    <button class="crisis-btn">
      SOS CRISE
    </button>

  </div>

</body>
</html>

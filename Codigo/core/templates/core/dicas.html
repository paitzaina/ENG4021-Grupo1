{% extends 'core/base.html' %}

{% block title %}Mindly - Dicas{% endblock %}

{% block content %}
<div class="topbar">
  <a href="{% url 'home' %}" class="back"><</a>
  <span class="topbar-title">Dicas</span>
</div>

<div class="screen-content">
  <div class="dicas-layout">

    <div class="dicas-cats">
      <button class="cat-btn active">Ansiedade</button>
      <button class="cat-btn">Estresse</button>
      <button class="cat-btn">Foco/<br>estudos</button>
      <button class="cat-btn">Sono</button>
    </div>

    <div class="dicas-content">
      {% for dica in dicas %}
      <div class="dica-card">
        <span class="dica-icon">💡</span>
        <div>
          <div class="dica-label">{{ dica.titulo }}</div>
          <div class="dica-sub">{{ dica.descricao }}</div>
        </div>
      </div>
      {% empty %}
      <div class="dica-card">
        <div>
          <div class="dica-label">Nenhuma dica cadastrada ainda.</div>
        </div>
      </div>
      {% endfor %}
    </div>

  </div>
</div>
{% endblock %}

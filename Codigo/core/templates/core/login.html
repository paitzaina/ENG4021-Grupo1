{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindApp - Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

  <div class="auth-shell">
    <div class="auth-card">

      <a href="{% url 'home' %}" class="auth-back">&lsaquo; Voltar ao site</a>

      <div class="auth-logo">
        <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="15" cy="11" r="7" fill="white" opacity="0.9"/>
          <path d="M9 18 Q9 26 15 26 Q21 26 21 18" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="12" cy="10" r="1.5" fill="#5ba4cf"/>
          <circle cx="18" cy="10" r="1.5" fill="#5ba4cf"/>
          <path d="M12 14 Q15 16.5 18 14" stroke="#5ba4cf" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="auth-appname">MindApp</div>
      <div class="auth-tagline">Acalme sua mente a qualquer momento, da onde estiver.</div>

      <div class="auth-title">Bem-vindo(a) de volta</div>
      <div class="auth-subtitle">Faca login para continuar</div>

      <!-- Formulario ainda sem validacao real -- autenticacao e tarefa da proxima sprint -->
      <form class="auth-form" method="post" action="{% url 'home' %}">
        <div class="form-group">
          <label>E-MAIL</label>
          <input type="email" placeholder="seu@email.com" name="email">
        </div>
        <div class="form-group">
          <label>SENHA</label>
          <input type="password" placeholder="********" name="senha">
        </div>
        <a href="#" class="auth-forgot">Esqueci minha senha</a>
        <button type="submit" class="auth-btn-primary">Entrar</button>
      </form>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span>ou</span>
        <div class="auth-divider-line"></div>
      </div>

      <button class="auth-btn-social" type="button">
        <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.2 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.4l7.9 6.1C12.4 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 6.9-10 6.9-17z"/><path fill="#FBBC05" d="M10.5 28.5c-.5-1.5-.8-3.1-.8-4.5s.3-3 .8-4.5L2.6 13.4C1 16.5 0 19.9 0 24s1 7.5 2.6 10.6l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-3.7-13.5-9l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/></svg>
        Continuar com Google
      </button>

      <div class="auth-signup">
        Nao tem conta? <a href="#">Cadastre-se</a>
      </div>

    </div>
  </div>

</body>
</html>
